<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Instrument+Serif:ital@0;1&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <title>My Weather App</title>
</head>
<body>
    <div class="weather-box">
    <header>
        <form class="search-form" id="search-form">
            <input type="search" class="search-form-input"  
            id="search-form-input" placeholder="Enter a city..."  required />
            <input type="submit" class="search-form-button" value="Search" />
        </form>
    </header>
    <main>
         <div class="app-data">
          <div>
            <h1 class="app-city" id="city"></h1>
            <p class="app-details">
              <span id="time"></span>,
              <span id="description"></span>
              <br />
              Humidity: <strong id="humidity"></strong>, Wind:
              <strong id="wind-speed"></strong>
            </p>
          </div>
        <div class="app-temp-container">
            <div class="weather-icon">🌤️</div>
            <div class="app-temp" id="temperature">12</div>
            <div class="app-unit">ºC</div>
        </div>
    </div>
    </main>

    <footer>
        This project was coded by <a href="https://github.com/nozadzelile" target="_blank">Lile Nozadze</a>, Code hosted on  
        <a href="https://github.com/nozadzelile/weather-app" target="_blank">Github</a> and hosted on
        <a href="https://app.netlify.com/projects/shecodes-weatherr/overview" target="_blank">Netlify</a>
    </footer>
    </div>
    
    <script src="src/index.js"></script>
</body>
</html>
